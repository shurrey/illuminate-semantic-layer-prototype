# Canonical metrics for the real Illuminate catalog, Snowflake CDM schema.
#
# This file is the target artifact for migration into illuminate-conversational-
# intelligence. It mirrors the prototype's canonical/metrics.yaml structure but:
#   - Uses Snowflake-native SQL (ILIKE, COUNT(*) OVER(), fully-qualified table names).
#   - References the CDM_LMS schema (PERSON, COURSE, TERM, PERSON_COURSE, GRADE).
#   - Templates the database name via Jinja `{{ database }}` — the engine must
#     pass this when rendering (one new kwarg in compile_sql when ported).
#
# Source: 12 metric-shaped entries from `verified_queries.json` in the CI repo
# (skipped: `list schemas`, `list tables in CDM_LMS` — catalog-browse utilities,
# not metrics).
#
# Each metric below records `originally:` for traceability back to the verified
# query intent it replaces. That field is non-semantic — for human auditors only.

metrics:

  - id: metric.student_count.v1
    version: "1.0.0"
    display_name: Student count
    description: >
      Total count of persons whose institution role is 'S' (student).
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Person
    originally: "total student count"
    measure_sql: |
      SELECT COUNT(*) AS STUDENT_COUNT
      FROM {{ database }}.CDM_LMS.PERSON
      WHERE INSTITUTION_ROLE = 'S'
      {% if where %}AND {{ where }}{% endif %}
    default_filters: []
    valid_dimensions: []
    synonyms: ["how many students", "student count", "total students", "number of students", "total enrollment"]
    example_questions:
      - "How many students are at this institution?"
      - "What's our student count?"

  - id: metric.instructor_count.v1
    version: "1.0.0"
    display_name: Instructor count
    description: >
      Total count of persons whose institution role is 'I' (instructor).
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Person
    originally: "instructor count"
    measure_sql: |
      SELECT COUNT(*) AS INSTRUCTOR_COUNT
      FROM {{ database }}.CDM_LMS.PERSON
      WHERE INSTITUTION_ROLE = 'I'
      {% if where %}AND {{ where }}{% endif %}
    default_filters: []
    valid_dimensions: []
    synonyms: ["how many instructors", "instructor count", "number of instructors", "total instructors", "how many teachers", "faculty count"]
    example_questions:
      - "How many instructors do we have?"
      - "What's our faculty count?"

  - id: metric.course_count.v1
    version: "1.0.0"
    display_name: Course count
    description: >
      Total count of all courses in the system. Returns a single scalar; see
      metric.active_courses.by_term.v1 for the per-term view.
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Course
    originally: "total course count"
    measure_sql: |
      SELECT COUNT(*) AS COURSE_COUNT
      FROM {{ database }}.CDM_LMS.COURSE
      {% if where %}WHERE {{ where }}{% endif %}
    default_filters: []
    valid_dimensions: []
    synonyms: ["how many courses", "course count", "total courses", "number of courses"]
    example_questions:
      - "How many courses do we have?"
      - "Total course count"

  - id: metric.active_courses.by_term.v1
    version: "1.0.0"
    display_name: Active courses by term
    description: >
      Number of distinct active courses grouped by term, joined through COURSE.TERM_ID.
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Course
    originally: "active courses by term"
    measure_sql: |
      SELECT t.NAME AS TERM_NAME,
             COUNT(DISTINCT c.COURSE_ID) AS COURSE_COUNT
      FROM {{ database }}.CDM_LMS.COURSE c
      JOIN {{ database }}.CDM_LMS.TERM t ON c.TERM_ID = t.TERM_ID
      {% if where %}WHERE {{ where }}{% endif %}
      GROUP BY t.NAME
      ORDER BY t.NAME
      LIMIT 100
    default_filters: []
    valid_dimensions: []
    synonyms: ["active courses", "current courses", "courses this term", "courses by term"]
    example_questions:
      - "How many active courses are there in each term?"
      - "Show courses by term."

  - id: metric.enrollment_count.by_term.v1
    version: "1.0.0"
    display_name: Enrollment by term
    description: >
      Distinct student enrollment counts grouped by academic term.
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Enrollment
    originally: "enrollment by term"
    measure_sql: |
      SELECT t.NAME AS TERM_NAME,
             COUNT(DISTINCT pc.PERSON_ID) AS ENROLLMENT_COUNT
      FROM {{ database }}.CDM_LMS.PERSON_COURSE pc
      JOIN {{ database }}.CDM_LMS.TERM t ON pc.TERM_ID = t.TERM_ID
      {% if where %}WHERE {{ where }}{% endif %}
      GROUP BY t.NAME
      ORDER BY t.NAME
      LIMIT 100
    default_filters: []
    valid_dimensions: []
    synonyms: ["enrollment by term", "students per term", "enrollment trends", "term enrollment", "enrollment over time"]
    example_questions:
      - "Show enrollment by term."
      - "How is enrollment trending over time?"

  - id: metric.enrollment_count.by_course.v1
    version: "1.0.0"
    display_name: Enrollment by course
    description: >
      Distinct student enrollment counts grouped by course, sorted descending.
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Enrollment
    originally: "course enrollment counts"
    measure_sql: |
      SELECT c.NAME AS COURSE_NAME,
             COUNT(DISTINCT pc.PERSON_ID) AS ENROLLMENT_COUNT
      FROM {{ database }}.CDM_LMS.PERSON_COURSE pc
      JOIN {{ database }}.CDM_LMS.COURSE c ON pc.COURSE_ID = c.COURSE_ID
      {% if where %}WHERE {{ where }}{% endif %}
      GROUP BY c.NAME
      ORDER BY ENROLLMENT_COUNT DESC
      LIMIT 100
    default_filters: []
    valid_dimensions: []
    synonyms: ["students per course", "course enrollment", "enrollment by course", "popular courses", "largest courses"]
    example_questions:
      - "Which courses have the most students?"
      - "Show enrollment by course."

  - id: metric.enrollment_summary.v1
    version: "1.0.0"
    display_name: Enrollment summary statistics
    description: >
      High-level enrollment summary across the warehouse: total distinct students,
      total distinct courses, total enrollments, and average courses per student.
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Enrollment
    originally: "enrollment summary statistics"
    measure_sql: |
      SELECT COUNT(DISTINCT PERSON_ID) AS TOTAL_STUDENTS,
             COUNT(DISTINCT COURSE_ID) AS TOTAL_COURSES,
             COUNT(*) AS TOTAL_ENROLLMENTS,
             ROUND(COUNT(*) * 1.0 / NULLIF(COUNT(DISTINCT PERSON_ID), 0), 1) AS AVG_COURSES_PER_STUDENT
      FROM {{ database }}.CDM_LMS.PERSON_COURSE
      {% if where %}WHERE {{ where }}{% endif %}
    default_filters: []
    valid_dimensions: []
    synonyms: ["enrollment statistics", "enrollment summary", "enrollment stats", "enrollment overview"]
    example_questions:
      - "Give me an enrollment overview."
      - "What's our enrollment summary?"

  - id: metric.average_gpa.v1
    version: "1.0.0"
    display_name: Average GPA (overall)
    description: >
      Overall mean of GRADE_NUMERIC across all graded records (4.0 scale).
      Note: GRADE_NUMERIC is the canonical 4.0-scale column. Do not substitute
      with normalized score columns — those are a different scale and not
      comparable to a GPA.
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Grade
    originally: "average GPA"
    measure_sql: |
      SELECT ROUND(AVG(GRADE_NUMERIC), 2) AS AVERAGE_GPA,
             COUNT(DISTINCT PERSON_ID) AS DISTINCT_STUDENTS
      FROM {{ database }}.CDM_LMS.GRADE
      WHERE GRADE_NUMERIC IS NOT NULL
      {% if where %}AND {{ where }}{% endif %}
    default_filters: []
    valid_dimensions: []
    synonyms: ["average gpa", "mean gpa", "overall gpa", "gpa average", "what is the gpa", "what's the gpa"]
    example_questions:
      - "What's our average GPA?"
      - "Overall GPA across all students."

  - id: metric.average_gpa.by_term.v1
    version: "1.0.0"
    display_name: Average GPA by term
    description: >
      Mean GRADE_NUMERIC (4.0 scale) grouped by academic term, with the count
      of distinct students contributing to each term's average.
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Grade
    originally: "GPA by term"
    measure_sql: |
      SELECT t.NAME AS TERM_NAME,
             ROUND(AVG(g.GRADE_NUMERIC), 2) AS AVERAGE_GPA,
             COUNT(DISTINCT g.PERSON_ID) AS DISTINCT_STUDENTS
      FROM {{ database }}.CDM_LMS.GRADE g
      JOIN {{ database }}.CDM_LMS.TERM t ON g.TERM_ID = t.TERM_ID
      WHERE g.GRADE_NUMERIC IS NOT NULL
      {% if where %}AND {{ where }}{% endif %}
      GROUP BY t.NAME
      ORDER BY t.NAME
      LIMIT 100
    default_filters: []
    valid_dimensions: []
    synonyms: ["gpa by term", "gpa trends", "gpa over time", "term gpa", "gpa per term", "gpa all terms", "gpa each term"]
    example_questions:
      - "How is GPA trending term over term?"
      - "Average GPA by term"

  - id: metric.average_gpa.for_term.v1
    version: "1.0.0"
    display_name: Average GPA for a specific term
    description: >
      Mean GRADE_NUMERIC (4.0 scale) for a single named term. Requires a
      `term_name` filter; the engine must pass it through to the WHERE clause.
      Until the engine supports parameter binding, callers can interpolate the
      term name into a filter SQL fragment (e.g. `t.NAME ILIKE '%Fall 2024%'`).
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Grade
    originally: "GPA for a specific term"
    measure_sql: |
      SELECT t.NAME AS TERM_NAME,
             ROUND(AVG(g.GRADE_NUMERIC), 2) AS AVERAGE_GPA,
             COUNT(DISTINCT g.PERSON_ID) AS DISTINCT_STUDENTS
      FROM {{ database }}.CDM_LMS.GRADE g
      JOIN {{ database }}.CDM_LMS.TERM t ON g.TERM_ID = t.TERM_ID
      WHERE g.GRADE_NUMERIC IS NOT NULL
      {% if where %}AND {{ where }}{% endif %}
      GROUP BY t.NAME
      ORDER BY t.NAME
    default_filters: []
    valid_dimensions: []
    synonyms: ["gpa for fall", "gpa for spring", "gpa fall 2024", "fall 2024 gpa", "spring 2024 gpa"]
    example_questions:
      - "What was our GPA in Fall 2024?"
      - "Show me the average GPA for Spring 2025."

  - id: metric.grade_distribution.v1
    version: "1.0.0"
    display_name: Grade distribution
    description: >
      Distribution of letter grades with raw counts and percentages of the total.
      Uses a window aggregate over COUNT(*) to compute the percentage.
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Grade
    originally: "grade distribution"
    measure_sql: |
      SELECT GRADE_LETTER,
             COUNT(*) AS GRADE_COUNT,
             ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS PERCENTAGE
      FROM {{ database }}.CDM_LMS.GRADE
      WHERE GRADE_LETTER IS NOT NULL
      {% if where %}AND {{ where }}{% endif %}
      GROUP BY GRADE_LETTER
      ORDER BY GRADE_LETTER
      LIMIT 100
    default_filters: []
    valid_dimensions: []
    synonyms: ["grade distribution", "grade breakdown", "letter grades", "grade counts", "how many as", "how many bs"]
    example_questions:
      - "What's our grade distribution?"
      - "Break down grades by letter."

  - id: metric.course_completion_rate.v1
    version: "1.0.0"
    display_name: Course completion rate
    description: >
      Percentage of enrollments per course with STATUS = 'COMPLETED', restricted
      to courses with at least 5 enrollments to avoid small-group noise and
      privacy concerns. Returns top 100 courses sorted by completion rate desc.
    owner: "Illuminate Data Product"
    authority: vendor-canonical
    last_reviewed: 2026-05-21
    entity: Enrollment
    originally: "course completion rates"
    measure_sql: |
      SELECT c.NAME AS COURSE_NAME,
             COUNT(*) AS TOTAL_ENROLLED,
             SUM(CASE WHEN pc.STATUS = 'COMPLETED' THEN 1 ELSE 0 END) AS COMPLETED,
             ROUND(SUM(CASE WHEN pc.STATUS = 'COMPLETED' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 1) AS COMPLETION_RATE
      FROM {{ database }}.CDM_LMS.PERSON_COURSE pc
      JOIN {{ database }}.CDM_LMS.COURSE c ON pc.COURSE_ID = c.COURSE_ID
      {% if where %}WHERE {{ where }}{% endif %}
      GROUP BY c.NAME
      HAVING COUNT(*) >= 5
      ORDER BY COMPLETION_RATE DESC
      LIMIT 100
    default_filters: []
    valid_dimensions: []
    synonyms: ["completion rate", "course completion", "pass rate", "success rate", "courses completed"]
    example_questions:
      - "Which courses have the highest completion rate?"
      - "What's our pass rate by course?"
