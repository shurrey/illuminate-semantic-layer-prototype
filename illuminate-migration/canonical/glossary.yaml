# Canonical synonym → metric_id mappings for the real Illuminate catalog.
#
# Derived from each metric's `synonyms` list in metrics.yaml. The
# `test_every_metric_synonym_is_in_canonical_glossary` pattern from the prototype
# can be re-applied here once the engine is ported, ensuring drift between
# metric synonyms and glossary entries fails fast.

synonyms:
  # student_count
  "how many students": "metric.student_count.v1"
  "student count": "metric.student_count.v1"
  "total students": "metric.student_count.v1"
  "number of students": "metric.student_count.v1"
  "total enrollment": "metric.student_count.v1"

  # instructor_count
  "how many instructors": "metric.instructor_count.v1"
  "instructor count": "metric.instructor_count.v1"
  "number of instructors": "metric.instructor_count.v1"
  "total instructors": "metric.instructor_count.v1"
  "how many teachers": "metric.instructor_count.v1"
  "faculty count": "metric.instructor_count.v1"

  # course_count
  "how many courses": "metric.course_count.v1"
  "course count": "metric.course_count.v1"
  "total courses": "metric.course_count.v1"
  "number of courses": "metric.course_count.v1"

  # active_courses.by_term
  "active courses": "metric.active_courses.by_term.v1"
  "current courses": "metric.active_courses.by_term.v1"
  "courses this term": "metric.active_courses.by_term.v1"
  "courses by term": "metric.active_courses.by_term.v1"

  # enrollment_count.by_term
  "enrollment by term": "metric.enrollment_count.by_term.v1"
  "students per term": "metric.enrollment_count.by_term.v1"
  "enrollment trends": "metric.enrollment_count.by_term.v1"
  "term enrollment": "metric.enrollment_count.by_term.v1"
  "enrollment over time": "metric.enrollment_count.by_term.v1"

  # enrollment_count.by_course
  "students per course": "metric.enrollment_count.by_course.v1"
  "course enrollment": "metric.enrollment_count.by_course.v1"
  "enrollment by course": "metric.enrollment_count.by_course.v1"
  "popular courses": "metric.enrollment_count.by_course.v1"
  "largest courses": "metric.enrollment_count.by_course.v1"

  # enrollment_summary
  "enrollment statistics": "metric.enrollment_summary.v1"
  "enrollment summary": "metric.enrollment_summary.v1"
  "enrollment stats": "metric.enrollment_summary.v1"
  "enrollment overview": "metric.enrollment_summary.v1"

  # average_gpa (overall)
  "average gpa": "metric.average_gpa.v1"
  "mean gpa": "metric.average_gpa.v1"
  "overall gpa": "metric.average_gpa.v1"
  "gpa average": "metric.average_gpa.v1"
  "what is the gpa": "metric.average_gpa.v1"
  "what's the gpa": "metric.average_gpa.v1"

  # average_gpa.by_term
  "gpa by term": "metric.average_gpa.by_term.v1"
  "gpa trends": "metric.average_gpa.by_term.v1"
  "gpa over time": "metric.average_gpa.by_term.v1"
  "term gpa": "metric.average_gpa.by_term.v1"
  "gpa per term": "metric.average_gpa.by_term.v1"
  "gpa all terms": "metric.average_gpa.by_term.v1"
  "gpa each term": "metric.average_gpa.by_term.v1"

  # average_gpa.for_term
  "gpa for fall": "metric.average_gpa.for_term.v1"
  "gpa for spring": "metric.average_gpa.for_term.v1"
  "gpa fall 2024": "metric.average_gpa.for_term.v1"
  "fall 2024 gpa": "metric.average_gpa.for_term.v1"
  "spring 2024 gpa": "metric.average_gpa.for_term.v1"

  # grade_distribution
  "grade distribution": "metric.grade_distribution.v1"
  "grade breakdown": "metric.grade_distribution.v1"
  "letter grades": "metric.grade_distribution.v1"
  "grade counts": "metric.grade_distribution.v1"
  "how many as": "metric.grade_distribution.v1"
  "how many bs": "metric.grade_distribution.v1"

  # course_completion_rate
  "completion rate": "metric.course_completion_rate.v1"
  "course completion": "metric.course_completion_rate.v1"
  "pass rate": "metric.course_completion_rate.v1"
  "success rate": "metric.course_completion_rate.v1"
  "courses completed": "metric.course_completion_rate.v1"
