overrides:
  - canonical_id: metric.retention_rate.term_to_term.v1
    owner: "Lone Star Registrar's Office"
    last_reviewed: 2026-04-02
    diff_description: "Restricted to degree-seeking students; fall-to-fall pairing instead of consecutive terms."
    measure_sql: |
      WITH base AS (
        SELECT DISTINCT e.student_id, t.ordinal AS term_ordinal
        FROM enrollments e
        JOIN terms t ON t.term_id = e.term_id
        JOIN students s ON s.student_id = e.student_id
        WHERE s.is_degree_seeking = TRUE
        {% if where %}AND {{ where }}{% endif %}
      ),
      fall_pairs AS (
        SELECT a.student_id, a.term_ordinal AS from_ord
        FROM base a
        WHERE (a.term_ordinal % 2) = 1
          AND EXISTS (
            SELECT 1 FROM base b
            WHERE b.student_id = a.student_id
              AND b.term_ordinal = a.term_ordinal + 2
          )
      ),
      counts AS (
        SELECT base.term_ordinal AS from_ord,
               COUNT(DISTINCT base.student_id) AS n_in_term,
               COUNT(DISTINCT fall_pairs.student_id) AS n_retained
        FROM base
        LEFT JOIN fall_pairs
          ON fall_pairs.student_id = base.student_id
         AND fall_pairs.from_ord = base.term_ordinal
        WHERE (base.term_ordinal % 2) = 1
        GROUP BY base.term_ordinal
      )
      SELECT from_ord AS from_term_ordinal,
             n_in_term,
             n_retained,
             CASE WHEN n_in_term = 0 THEN NULL
                  ELSE ROUND(1.0 * n_retained / n_in_term, 4) END AS retention_rate
      FROM counts
      WHERE from_ord < (SELECT MAX(term_ordinal) - 1 FROM base)
      ORDER BY from_ord
